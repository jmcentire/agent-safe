name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20
      - run: cd sdk/js && npm ci && npm run build && npm test
      - name: Audit dependencies
        run: cd sdk/js && npm audit --audit-level=moderate || true

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.22"
      - run: cd sdk/go && go vet ./...
      - run: cd sdk/go && go test ./spl/ -v
      - name: Audit dependencies
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd sdk/go && govulncheck ./... || true

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: |
          cd sdk/python
          pip install -e ".[dev]"
          pytest tests/ -v
      - name: Audit dependencies
        run: |
          pip install pip-audit
          cd sdk/python && pip-audit || true

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
      - run: cd sdk/rust && cargo clippy -- -D warnings
      - run: cd sdk/rust && cargo test
      - name: Audit dependencies
        run: |
          cargo install cargo-audit
          cd sdk/rust && cargo audit || true

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21
      - run: cd sdk/java && mvn test -B

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "10.0"
      - run: cd sdk/csharp && dotnet test
