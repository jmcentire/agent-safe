name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20
      - run: cd sdk/js && npm ci && npm run build && npm test
      - name: Audit dependencies
        run: cd sdk/js && npm audit --audit-level=moderate || true

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
      - run: cd sdk/go && go vet ./...
      - run: cd sdk/go && go test ./spl/ -v
      - name: Audit dependencies
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd sdk/go && govulncheck ./... || true

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: |
          cd sdk/python
          pip install -e ".[dev]"
          pytest tests/ -v
      - name: Audit dependencies
        run: |
          pip install pip-audit
          cd sdk/python && pip-audit || true

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
      - run: cd sdk/rust && cargo clippy -- -D warnings
      - run: cd sdk/rust && cargo test
      - name: Audit dependencies
        run: |
          cargo install cargo-audit
          cd sdk/rust && cargo audit || true

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21
      - run: cd sdk/java && mvn test -B

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.0"
      - run: cd sdk/csharp && dotnet test
